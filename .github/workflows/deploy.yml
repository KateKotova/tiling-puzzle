name: Deploy to GitHub Pages

# Триггер: запускать при push в ветку master, develop
on:
  push:
    branches: ["master", "develop"]

# Разрешаем GITHUB_TOKEN запись в Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Контроль параллельного выполнения
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build
        # env:
          # Важно: если routing требует базовый путь, передаём его.
          # PUBLIC_PATH: /tiling-puzzle/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "./dist" # Путь до папки со сборкой.

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4